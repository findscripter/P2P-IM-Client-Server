# continuwuity 配置模板
# 复制到服务器 /etc/continuwuity/continuwuity.toml，填入实际值

[global]
# 你的域名（和 nginx server_name 一致）
server_name = "liyananp2p.com"        # 改成实际域名

# 监听地址（nginx 反代过来）
port = 6167
address = "127.0.0.1"

# 数据库目录
database_path = "/var/lib/continuwuity"

# 最大请求体大小（文件传输）
max_request_size = 104857600          # 100 MB

# 注册（新系统初始化时开启，稳定后关闭）
allow_registration = true
# registration_token = "your-secret-token-here"   # 生产时启用注册 token

# Federation
allow_federation = true

# TURN（WebRTC 通话）
turn_uris = ["turn:185.115.207.219:3478?transport=udp", "turn:185.115.207.219:3478?transport=tcp"]
turn_secret = ""                      # 改成 /root/turn-credentials.txt 中的密码
turn_username = "agentp2p"
turn_ttl = 86400

# 日志
log = "info"
