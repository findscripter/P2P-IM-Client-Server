# Server B — liyananp2p.com (腾讯云国内生产节点)
# Matrix + 旧 Portal 共存（旧 Portal 监听 127.0.0.1:8080）
# SSL 证书: Let's Encrypt (certbot)

server {
    listen 80;
    server_name liyananp2p.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name liyananp2p.com;

    ssl_certificate /etc/letsencrypt/live/liyananp2p.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/liyananp2p.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;

    client_max_body_size 100M;

    # ── Matrix continuwuity ────────────────────────────────────────
    location /_matrix/ {
        proxy_pass http://127.0.0.1:6167;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location = /.well-known/matrix/server {
        return 200 '{"m.server": "liyananp2p.com:443"}';
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
    }

    location = /.well-known/matrix/client {
        return 200 '{"m.homeserver": {"base_url": "https://liyananp2p.com"}}';
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
    }

    location = /.well-known/portal/owner.json {
        return 200 '{"matrix_user_id":"@owner:liyananp2p.com","display_name":"施歌"}';
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
    }

    # Portal App (Flutter Web Build)
    location /app/ {
        alias /var/www/portal-app-v2/;
        try_files $uri $uri/ /app/index.html;
    }

    # ── 旧 Portal (agent-p2p.service，uvicorn :8080) ───────────────
    location = /health {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }
    location /ws/agent {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }
    location /docs {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /openapi.json {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        root /var/www/portal-web;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
