# Server A — 185-115-207-219.nip.io (ByteVirt 海外测试节点)
# Matrix only — 旧 Portal 已下线
# SSL 证书: Let's Encrypt (certbot)

server {
    listen 80;
    server_name 185-115-207-219.nip.io;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name 185-115-207-219.nip.io;
    ssl_certificate /etc/letsencrypt/live/185-115-207-219.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/185-115-207-219.nip.io/privkey.pem;
    client_max_body_size 100M;

    # ── Matrix continuwuity ────────────────────────────────────────
    location /_matrix/ {
        proxy_pass http://127.0.0.1:6167;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Matrix Well-Known
    location = /.well-known/matrix/server {
        return 200 '{"m.server": "185-115-207-219.nip.io:443"}';
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
    }

    location = /.well-known/matrix/client {
        return 200 '{"m.homeserver": {"base_url": "https://185-115-207-219.nip.io"}}';
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
    }

    # Portal 身份发现（域名加好友）
    location = /.well-known/portal/owner.json {
        return 200 '{"matrix_user_id":"@owner:185-115-207-219.nip.io","display_name":"Alice"}';
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
    }

    # Element Web（根路径，Matrix 官方 web 客户端，调试用）
    location / {
        root /var/www/element;
        try_files $uri $uri/ /index.html;
        location = /config.json {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
        location ~* \.(js|css|png|jpg|svg|woff2?)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Portal App (Flutter Web Build)
    location /app/ {
        alias /var/www/portal-app/;
        try_files $uri $uri/ /app/index.html;
    }
}
