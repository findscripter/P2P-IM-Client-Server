# Portal IM — nginx 配置模板（纯 Matrix 版）
# 替换所有 YOUR_DOMAIN 为实际域名，例如 example.com
# 替换 YOUR_DISPLAY_NAME 为该节点 owner 的显示名称
#
# 部署步骤：
#   1. cp portal-matrix.conf /etc/nginx/sites-available/YOUR_DOMAIN
#   2. sed -i 's/YOUR_DOMAIN/example.com/g; s/YOUR_DISPLAY_NAME/Alice/g' /etc/nginx/sites-available/YOUR_DOMAIN
#   3. ln -s /etc/nginx/sites-available/YOUR_DOMAIN /etc/nginx/sites-enabled/
#   4. certbot --nginx -d YOUR_DOMAIN
#   5. nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name YOUR_DOMAIN;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 100M;

    # ── Matrix continuwuity ────────────────────────────────────────
    location /_matrix/ {
        proxy_pass http://127.0.0.1:6167;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Matrix Well-Known（federation 发现）
    location = /.well-known/matrix/server {
        return 200 '{"m.server": "YOUR_DOMAIN:443"}';
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
    }

    location = /.well-known/matrix/client {
        return 200 '{"m.homeserver": {"base_url": "https://YOUR_DOMAIN"}}';
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
    }

    # Portal 身份发现（域名加好友用）
    location = /.well-known/portal/owner.json {
        return 200 '{"matrix_user_id":"@owner:YOUR_DOMAIN","display_name":"YOUR_DISPLAY_NAME"}';
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
    }

    # Portal App（Flutter Web Build，GitHub Actions 产物部署到此）
    location /app/ {
        alias /var/www/portal-app/;
        try_files $uri $uri/ /app/index.html;
    }

    # 根路径可选：Element Web 或静态页，不需要时删除此块
    location / {
        root /var/www/html;
        index index.html;
        try_files $uri $uri/ =404;
    }
}
