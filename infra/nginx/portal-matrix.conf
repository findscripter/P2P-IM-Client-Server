# nginx 配置模板（两台服务器通用，改 server_name 和域名即可）
# Server A: 185-115-207-219.nip.io
# Server B: liyananp2p.com

server {
    listen 443 ssl;
    http2 on;
    server_name liyananp2p.com;                  # 改成实际域名

    ssl_certificate /etc/letsencrypt/live/liyananp2p.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/liyananp2p.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # continuwuity Matrix API
    location /_matrix/ {
        proxy_pass http://127.0.0.1:6167;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size 100M;

        # WebSocket（Matrix /sync）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Matrix Well-Known（federation 发现）
    location = /.well-known/matrix/server {
        return 200 '{"m.server": "liyananp2p.com:443"}';
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
    }

    location = /.well-known/matrix/client {
        return 200 '{"m.homeserver": {"base_url": "https://liyananp2p.com"}}';
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
    }

    # Portal 身份发现（域名加好友用）
    location = /.well-known/portal/owner.json {
        return 200 '{"matrix_user_id":"@owner:liyananp2p.com","display_name":"施歌"}';
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
    }

    # Flutter Web App（GitHub Actions 构建产物部署到这里）
    location /app/ {
        alias /var/www/portal-app/;
        try_files $uri $uri/ /app/index.html;
    }
}

server {
    listen 80;
    server_name liyananp2p.com;
    return 301 https://$host$request_uri;
}
